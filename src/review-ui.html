    <style id="local-mr-review-ui">
      html {
        height: 100%;
        scroll-behavior: smooth;
      }

      body {
        --lm-accent: #4991e0;
        --lm-accent-soft: #eaf5ff;
        --lm-bg: #f7f8fa;
        --lm-border: #e5e6eb;
        --lm-code-bg: #ffffff;
        --lm-header-bg: #ffffff;
        --lm-hover: #f0f3f7;
        --lm-muted: #7d8089;
        --lm-panel: #ffffff;
        --lm-selected: #eaf5ff;
        --lm-text: #292929;
        --lm-green: #6dc37d;
        --lm-green-soft: #d8fed8;
        --lm-red: #f36479;
        --lm-red-soft: #ffebed;
        --d2h-bg-color: #ffffff;
        --d2h-border-color: #dfe3e8;
        --d2h-file-header-bg-color: #f8f9fb;
        --d2h-file-header-border-color: #dfe3e8;
        --d2h-line-border-color: #edf0f3;
        --d2h-info-bg-color: rgba(0, 136, 255, 0.07);
        --d2h-info-border-color: #d8eaf8;
        --d2h-ins-bg-color: #d8fed8;
        --d2h-ins-border-color: #beecc1;
        --d2h-ins-highlight-bg-color: #b8edbf;
        --d2h-del-bg-color: #ffebed;
        --d2h-del-border-color: #f6ccd2;
        --d2h-del-highlight-bg-color: #f7c5cc;
        box-sizing: border-box;
        height: 100%;
        margin: 0 !important;
        overflow: hidden;
        background: var(--lm-bg) !important;
        color: var(--lm-text);
        font-family: "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif !important;
        text-align: left !important;
      }

      html:not(.local-mr-ready) body > h1,
      html:not(.local-mr-ready) body > .local-mr-version-bar,
      html:not(.local-mr-ready) #diff {
        visibility: hidden;
      }

      html:not(.local-mr-ready) body::after {
        position: fixed;
        inset: 0;
        z-index: 6;
        display: grid;
        place-items: center;
        background: var(--lm-bg);
        color: var(--lm-muted);
        content: "Preparing version diff…";
        font-size: 12px;
      }

      body.local-mr-dark {
        --lm-accent: #6ea8fe;
        --lm-accent-soft: #17345f;
        --lm-bg: #0f141b;
        --lm-border: #2b3440;
        --lm-code-bg: #111820;
        --lm-header-bg: #151c25;
        --lm-hover: #1b2430;
        --lm-muted: #8f9bad;
        --lm-panel: #151c25;
        --lm-selected: #1b3559;
        --lm-text: #e6edf5;
        --lm-green: #56c985;
        --lm-green-soft: #123522;
        --lm-red: #ff7b83;
        --lm-red-soft: #3c1d23;
        --d2h-dark-bg-color: #111820;
        --d2h-dark-border-color: #2b3440;
        --d2h-dark-file-header-bg-color: #18212b;
        --d2h-dark-file-header-border-color: #2b3440;
        --d2h-dark-line-border-color: #222c37;
        --d2h-dark-ins-bg-color: #123522;
        --d2h-dark-ins-border-color: #23583a;
        --d2h-dark-ins-highlight-bg-color: #286342;
        --d2h-dark-del-bg-color: #3c1d23;
        --d2h-dark-del-border-color: #69313a;
        --d2h-dark-del-highlight-bg-color: #733740;
      }

      @media (prefers-color-scheme: dark) {
        body.local-mr-auto {
          --lm-accent: #6ea8fe;
          --lm-accent-soft: #17345f;
          --lm-bg: #0f141b;
          --lm-border: #2b3440;
          --lm-code-bg: #111820;
          --lm-header-bg: #151c25;
          --lm-hover: #1b2430;
          --lm-muted: #8f9bad;
          --lm-panel: #151c25;
          --lm-selected: #1b3559;
          --lm-text: #e6edf5;
          --lm-green: #56c985;
          --lm-green-soft: #123522;
          --lm-red: #ff7b83;
          --lm-red-soft: #3c1d23;
          --d2h-dark-bg-color: #111820;
          --d2h-dark-border-color: #2b3440;
          --d2h-dark-file-header-bg-color: #18212b;
          --d2h-dark-file-header-border-color: #2b3440;
          --d2h-dark-line-border-color: #222c37;
          --d2h-dark-ins-bg-color: #123522;
          --d2h-dark-ins-border-color: #23583a;
          --d2h-dark-ins-highlight-bg-color: #286342;
          --d2h-dark-del-bg-color: #3c1d23;
          --d2h-dark-del-border-color: #69313a;
          --d2h-dark-del-highlight-bg-color: #733740;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body > h1 {
        position: relative;
        z-index: 4;
        display: flex;
        height: 54px;
        margin: 0;
        padding: 0 18px;
        align-items: center;
        gap: 10px;
        overflow: hidden;
        border-bottom: 1px solid var(--lm-border);
        background: var(--lm-header-bg);
        color: var(--lm-text) !important;
        font-size: 13px;
        font-weight: 500;
        line-height: 1;
        white-space: nowrap;
      }

      .local-mr-brand {
        flex: 0 0 auto;
        padding-right: 14px;
        border-right: 1px solid var(--lm-border);
        color: var(--lm-accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
      }

      .local-mr-branch {
        max-width: min(28vw, 420px);
        overflow: hidden;
        color: var(--lm-text);
        font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
        font-size: 12px;
        text-overflow: ellipsis;
      }

      .local-mr-target {
        color: var(--lm-muted);
      }

      .local-mr-arrow {
        flex: 0 0 auto;
        color: var(--lm-muted);
      }

      .local-mr-summary {
        display: flex;
        margin-left: auto;
        align-items: center;
        gap: 12px;
        color: var(--lm-muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .local-mr-summary-added {
        color: var(--lm-green);
      }

      .local-mr-summary-deleted {
        color: var(--lm-red);
      }

      .local-mr-version-bar {
        position: relative;
        z-index: 5;
        display: flex;
        height: 50px;
        padding: 8px 12px;
        align-items: center;
        border-bottom: 1px solid var(--lm-border);
        background: var(--lm-panel);
        color: var(--lm-text);
        font-size: 14px;
      }

      .local-mr-version-control {
        position: relative;
        height: 32px;
        flex: 0 0 auto;
      }

      .local-mr-version-mode {
        width: 110px;
      }

      .local-mr-push-version {
        width: 180px;
      }

      .local-mr-commit-range {
        width: 280px;
      }

      .local-mr-version-trigger {
        display: flex;
        width: 100%;
        height: 32px;
        padding: 0 10px;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        overflow: hidden;
        border: 1px solid var(--lm-border);
        border-radius: 4px;
        background: var(--lm-panel);
        color: var(--lm-text);
        cursor: pointer;
        font: inherit;
        line-height: 30px;
        text-align: left;
        transition: border-color 140ms ease, box-shadow 140ms ease;
      }

      .local-mr-version-control + .local-mr-version-control .local-mr-version-trigger {
        border-left: 0;
        border-radius: 0 4px 4px 0;
      }

      .local-mr-version-mode .local-mr-version-trigger {
        border-radius: 4px 0 0 4px;
      }

      .local-mr-version-control.local-mr-open .local-mr-version-trigger,
      .local-mr-version-trigger:focus-visible {
        z-index: 1;
        border-color: var(--lm-accent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--lm-accent) 14%, transparent);
      }

      .local-mr-version-trigger-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .local-mr-version-chevron {
        flex: 0 0 auto;
        color: var(--lm-muted);
        font-size: 14px;
        transform: rotate(90deg);
        transition: transform 140ms ease;
      }

      .local-mr-version-control.local-mr-open .local-mr-version-chevron {
        transform: rotate(-90deg);
      }

      .local-mr-version-arrow {
        display: grid;
        width: 30px;
        height: 32px;
        flex: 0 0 30px;
        place-items: center;
        color: var(--lm-muted);
        font-size: 15px;
      }

      .local-mr-version-menu {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        z-index: 20;
        width: 320px;
        max-height: min(416px, calc(100vh - 128px));
        overflow: auto;
        border: 1px solid var(--lm-border);
        border-radius: 4px;
        background: var(--lm-panel);
        box-shadow: 0 6px 18px color-mix(in srgb, #000000 16%, transparent);
        scrollbar-color: var(--lm-border) transparent;
        scrollbar-width: thin;
      }

      .local-mr-version-mode .local-mr-version-menu {
        width: 110px;
      }

      .local-mr-commit-range .local-mr-version-menu {
        width: 400px;
      }

      .local-mr-version-option {
        display: flex;
        width: 100%;
        min-height: 58px;
        padding: 7px 12px;
        flex-direction: column;
        justify-content: center;
        border: 0;
        background: transparent;
        color: var(--lm-text);
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      .local-mr-version-mode .local-mr-version-option {
        min-height: 32px;
        padding: 5px 12px;
      }

      .local-mr-version-option:hover {
        background: var(--lm-hover);
      }

      .local-mr-version-option.local-mr-selected {
        background: var(--lm-selected);
      }

      .local-mr-version-option-title {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        overflow: hidden;
        font-size: 14px;
        line-height: 21px;
      }

      .local-mr-version-option-title > span:first-child {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .local-mr-version-option-description {
        overflow: hidden;
        color: var(--lm-muted);
        font-size: 12px;
        line-height: 19px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .local-mr-commit-section-label {
        display: flex;
        height: 36px;
        padding: 0 12px;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-top: 1px solid var(--lm-border);
        border-bottom: 1px solid var(--lm-border);
        color: var(--lm-text);
        font-size: 14px;
      }

      .local-mr-commit-section-label small {
        overflow: hidden;
        color: var(--lm-muted);
        font-size: 12px;
        font-weight: 400;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .local-mr-commit-option {
        min-height: 58px;
      }

      .local-mr-commit-check {
        width: 8px;
        height: 8px;
        flex: 0 0 8px;
        border: 1px solid var(--lm-border);
        border-radius: 50%;
        background: var(--lm-panel);
      }

      .local-mr-commit-option.local-mr-selected .local-mr-commit-check {
        border-color: var(--lm-accent);
        background: var(--lm-accent);
        box-shadow: inset 0 0 0 2px var(--lm-panel);
      }

      .local-mr-version-loading::after {
        position: fixed;
        inset: 104px 0 0;
        z-index: 50;
        display: grid;
        place-items: start center;
        padding-top: 28px;
        background: color-mix(in srgb, var(--lm-bg) 78%, transparent);
        color: var(--lm-muted);
        content: "Generating version diff…";
        font-size: 12px;
        backdrop-filter: blur(1px);
      }

      #diff {
        display: grid;
        height: calc(100% - 54px);
        min-height: 0;
        grid-template-columns: 320px minmax(0, 1fr);
      }

      body.local-mr-has-version-bar #diff {
        height: calc(100% - 104px);
      }

      #diff > .d2h-file-list-wrapper {
        min-width: 0;
        height: 100%;
        margin: 0;
        overflow: auto;
        border-right: 1px solid var(--lm-border);
        background: var(--lm-panel) !important;
        color: var(--lm-text) !important;
        scrollbar-color: var(--lm-border) transparent;
        scrollbar-width: thin;
      }

      .d2h-file-list-header {
        position: sticky;
        top: 0;
        z-index: 3;
        display: flex;
        padding: 14px 12px 11px;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--lm-border);
        background: var(--lm-panel);
      }

      .d2h-file-list-title {
        color: var(--lm-text);
        font-size: 12px;
        font-weight: 650;
      }

      .d2h-file-switch {
        display: none !important;
      }

      .local-mr-search-label {
        position: relative;
        display: block;
        width: 100%;
      }

      .local-mr-search-label::before {
        position: absolute;
        top: 50%;
        left: 10px;
        color: var(--lm-muted);
        content: "⌕";
        font-size: 16px;
        line-height: 1;
        transform: translateY(-54%);
      }

      .local-mr-search {
        width: 100%;
        height: 32px;
        padding: 0 9px 0 30px;
        outline: none;
        border: 1px solid var(--lm-border);
        border-radius: 4px;
        background: var(--lm-bg);
        color: var(--lm-text);
        font: inherit;
        font-size: 12px;
        transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .local-mr-search::placeholder {
        color: var(--lm-muted);
      }

      .local-mr-search:focus {
        border-color: var(--lm-accent);
        background: var(--lm-panel);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--lm-accent) 16%, transparent);
      }

      .d2h-file-list {
        display: block !important;
        margin: 0;
        padding: 6px 0 20px;
        list-style: none;
      }

      .local-mr-tree li {
        margin: 0;
        padding: 0 !important;
        border: 0 !important;
        list-style: none;
      }

      .local-mr-tree .d2h-file-list-line {
        cursor: pointer;
      }

      .local-mr-tree li[hidden] {
        display: none;
      }

      .local-mr-tree-children {
        margin: 0;
        padding: 0 0 0 14px;
        list-style: none;
      }

      .local-mr-tree-directory-row {
        display: flex;
        width: 100%;
        height: 24px;
        padding: 0 9px;
        align-items: center;
        overflow: hidden;
        border: 0;
        background: transparent;
        color: var(--lm-muted);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        text-align: left;
        transition: background 140ms ease, color 140ms ease;
      }

      .local-mr-tree-directory-row:hover {
        background: var(--lm-hover);
        color: var(--lm-text);
      }

      .local-mr-tree-chevron {
        width: 12px;
        flex: 0 0 12px;
        font-size: 13px;
        transform: rotate(90deg);
        transform-origin: center;
        transition: transform 140ms ease;
      }

      .local-mr-tree-directory.local-mr-collapsed > .local-mr-tree-directory-row .local-mr-tree-chevron {
        transform: rotate(0deg);
      }

      .local-mr-tree-folder-icon {
        position: relative;
        width: 12px;
        height: 9px;
        margin: 1px 7px 0 2px;
        flex: 0 0 12px;
        border-radius: 1px;
        background: color-mix(in srgb, var(--lm-muted) 76%, transparent);
      }

      .local-mr-tree-folder-icon::before {
        position: absolute;
        top: -3px;
        left: 1px;
        width: 6px;
        height: 4px;
        border-radius: 1px 1px 0 0;
        background: inherit;
        content: "";
      }

      .local-mr-tree-directory-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .d2h-file-list-line .d2h-file-name-wrapper {
        min-width: 0;
        min-height: 24px;
        padding: 2px 9px;
        gap: 0;
        border-left: 2px solid transparent;
        transition: background 140ms ease, border-color 140ms ease;
      }

      .d2h-file-list-line:hover .d2h-file-name-wrapper {
        background: var(--lm-hover);
      }

      .d2h-file-list-line.local-mr-active .d2h-file-name-wrapper {
        border-left-color: var(--lm-accent);
        background: var(--lm-selected);
      }

      .d2h-file-list-line.local-mr-active .d2h-file-name {
        color: var(--lm-accent) !important;
      }

      .d2h-file-list-line .d2h-icon {
        width: 13px;
        height: 13px;
        margin-right: 8px;
        flex: 0 0 auto;
      }

      .d2h-file-list-line .d2h-file-name {
        display: flex;
        min-width: 0;
        flex: 1 1 auto;
        overflow: hidden;
        align-items: baseline;
        color: var(--lm-text) !important;
        font-family: "Segoe UI Variable Text", "Segoe UI", "PingFang SC", Arial, sans-serif;
        font-size: 12px;
        line-height: 19px;
        text-decoration: none;
        white-space: nowrap;
      }

      .local-mr-file-read-status {
        display: inline-flex;
        position: relative;
        width: 24px;
        height: 24px;
        margin-left: 3px;
        flex: 0 0 24px;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 0;
        border: 0;
        border-radius: 50%;
        appearance: none;
        background: transparent;
        cursor: pointer;
      }

      .local-mr-file-read-status:hover {
        background: color-mix(in srgb, var(--lm-accent) 10%, transparent);
      }

      .local-mr-file-read-status::before {
        width: 14px;
        height: 14px;
        box-sizing: border-box;
        border: 1px solid color-mix(in srgb, var(--lm-accent) 72%, var(--lm-border));
        border-radius: 50%;
        background: transparent;
        content: "";
      }

      .d2h-file-list-line.local-mr-read .local-mr-file-read-status::before {
        border-color: var(--lm-accent);
        background: var(--lm-accent);
      }

      .d2h-file-list-line.local-mr-read .local-mr-file-read-status::after {
        position: absolute;
        color: #fff;
        content: "✓";
        font-family: Arial, sans-serif;
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
      }

      .local-mr-visually-hidden {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        margin: -1px !important;
        padding: 0 !important;
        overflow: hidden !important;
        clip: rect(0 0 0 0) !important;
        clip-path: inset(50%) !important;
        border: 0 !important;
        white-space: nowrap !important;
      }

      .local-mr-basename {
        min-width: 0;
        max-width: 100%;
        flex: 1 1 auto;
        overflow: hidden;
        font-weight: 600;
        text-overflow: ellipsis;
      }

      .d2h-file-list-line .d2h-file-stats {
        margin-left: 8px;
        flex: 0 0 auto;
        gap: 6px;
        font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
        font-size: 10px;
        font-variant-numeric: tabular-nums;
      }

      .d2h-file-list-line .d2h-lines-added,
      .d2h-file-list-line .d2h-lines-deleted {
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
      }

      .d2h-file-list-line .d2h-lines-added {
        color: var(--lm-green);
      }

      .d2h-file-list-line .d2h-lines-deleted {
        margin-left: 0;
        color: var(--lm-red);
      }

      .local-mr-empty {
        padding: 28px 16px !important;
        color: var(--lm-muted);
        cursor: default !important;
        font-size: 12px;
        text-align: center;
      }

      #diff > .d2h-wrapper {
        position: relative;
        min-width: 0;
        height: 100%;
        padding: 18px 20px 70px;
        overflow: auto;
        background: var(--lm-bg) !important;
        color: var(--lm-text) !important;
        scrollbar-color: var(--lm-border) transparent;
        scrollbar-width: thin;
      }

      #diff > .d2h-wrapper.local-mr-fragment-loading::after {
        position: absolute;
        inset: 18px 20px auto;
        display: grid;
        min-height: 72px;
        place-items: center;
        border: 1px solid var(--lm-border);
        border-radius: 5px;
        background: var(--lm-code-bg);
        color: var(--lm-muted);
        content: "Loading file diff…";
        font-size: 12px;
      }

      .d2h-file-wrapper {
        margin: 0 0 18px;
        border: 1px solid var(--lm-border) !important;
        border-radius: 5px;
        background: var(--lm-code-bg);
        box-shadow: 0 1px 2px color-mix(in srgb, var(--lm-text) 6%, transparent);
        scroll-margin-top: 12px;
      }

      .d2h-file-wrapper[hidden] {
        display: none !important;
      }

      .d2h-file-header {
        position: sticky;
        top: -1px;
        z-index: 2;
        height: 50px;
        padding: 6px 10px;
        align-items: center;
        border-bottom: 1px solid var(--lm-border) !important;
        border-radius: 5px 5px 0 0;
        background: var(--lm-header-bg) !important;
        color: var(--lm-text);
        font-family: "Segoe UI Variable Text", "Segoe UI", Arial, sans-serif;
      }

      .d2h-file-header .d2h-file-name-wrapper {
        width: auto;
        min-width: 0;
        flex: 1 1 auto;
      }

      .d2h-file-header .d2h-file-name {
        display: flex;
        min-width: 0;
        flex-direction: column;
        color: var(--lm-text);
        font-family: "Segoe UI Variable Text", "Segoe UI", "PingFang SC", Arial, sans-serif;
      }

      .local-mr-file-basename {
        overflow: hidden;
        font-size: 12px;
        font-weight: 650;
        line-height: 17px;
